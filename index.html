<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
  color:white;
  overflow-x:hidden;
}

/* LOADING */
#loading{
  position:fixed;
  width:100%;
  height:100vh;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #333;
  border-top:5px solid #00f7ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
}

.logo{
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px solid #00f7ff;
  margin:auto;
  display:block;
  object-fit:cover;
  box-shadow:0 0 20px #00f7ff;
}

.title{
  margin-top:10px;
  font-size:24px;
  font-weight:700;
}

/* DISCORD BUTTON */
.discord{
  margin-top:10px;
  display:inline-block;
  padding:10px 20px;
  background:#5865F2;
  color:white;
  border-radius:10px;
  text-decoration:none;
  transition:0.3s;
}
.discord:hover{
  transform:scale(1.05);
  background:#4752c4;
}

/* SHOP */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  text-align:center;
  transition:0.3s;
  backdrop-filter: blur(10px);
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 0 20px #00f7ff;
}

.price{
  font-size:18px;
  margin:10px 0;
}

.btn{
  margin-top:10px;
  display:inline-block;
  padding:10px 15px;
  background:#00f7ff;
  color:#000;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  background:#00c2cc;
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p style="margin-top:15px;">Đang tải shop...</p>
</div>

<!-- HEADER -->
<header>
  <!-- Logo (bạn thay ảnh vào src) -->
  <img class="logo" src="https://i.imgur.com/8Km9tLL.png" alt="logo">

  <div class="title">SHOP VIP NGUYỄN KHÔI</div>

  <a class="discord" href="https://discord.gg/FHYVyjnjfg" target="_blank">
    💬 Tham gia Discord
  </a>
</header>

<!-- SHOP -->
<div class="container">

  <div class="card">
    <h3>1 Ngày</h3>
    <div class="price">20.000 VNĐ</div>
    <a class="btn" href="https://zalo.me/84989288257">Mua ngay</a>
  </div>

  <div class="card">
    <h3>3 Ngày</h3>
    <div class="price">40.000 VNĐ</div>
    <a class="btn" href="https://zalo.me/84989288257">Mua ngay</a>
  </div>

  <div class="card">
    <h3>7 Ngày</h3>
    <div class="price">60.000 VNĐ</div>
    <a class="btn" href="https://zalo.me/84989288257">Mua ngay</a>
  </div>

  <div class="card">
    <h3>20 Ngày</h3>
    <div class="price">100.000 VNĐ</div>
    <a class="btn" href="https://zalo.me/84989288257">Mua ngay</a>
  </div>

  <div class="card">
    <h3>30 Ngày</h3>
    <div class="price">150.000 VNĐ</div>
    <a class="btn" href="https://zalo.me/84989288257">Mua ngay</a>
  </div>

  <div class="card">
    <h3>90 Ngày</h3>
    <div class="price">250.000 VNĐ</div>
    <a class="btn" href="https://zalo.me/84989288257">Mua ngay</a>
  </div>

  <div class="card">
    <h3>Vĩnh Viễn</h3>
    <div class="price">600.000 VNĐ</div>
    <a class="btn" href="https://zalo.me/84989288257">Mua ngay</a>
  </div>

</div>

<script>
// tắt loading
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
  },1200);
});
</script>

</body>
</html>
