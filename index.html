<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Key</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white;
        }
        .container {
            background: #252538;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid #3e3e5e;
        }
        h2 { margin-bottom: 1.5rem; color: #4facfe; }
        .key-box {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
            border: 1px solid #4facfe;
            color: #00f2fe;
            letter-spacing: 1px;
        }
        button {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            color: #1e1e2f;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
        }
        /* Style cho popup */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            font-size: 17px;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h2>🔑 Active Key</h2>
    <div class="key-box" id="myKey">NKHOI-KEYBOT-2752011</div>
    <button onclick="copyKey()">Sao chép Key</button>
</div>

<div id="toast">Vui lòng vào Discord nhập key!</div>

<script>
    function copyKey() {
        const key = document.getElementById("myKey").innerText;
        navigator.clipboard.writeText(key).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }
</script>

</body>
</html>
