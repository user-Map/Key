<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Authentication</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }
        
        /* Loading Screen */
        #loader { 
            position: fixed; inset: 0; 
            background: #050505; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            z-index: 100; transition: opacity 0.5s; 
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #1a1a1a; border-top: 3px solid #00ff41; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Container */
        .container { 
            background: #0d0d0d; 
            padding: 2.5rem; 
            border-radius: 8px; 
            border: 1px solid #222; 
            width: 90%; max-width: 420px; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.05); 
        }
        h2 { color: #fff; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        .key-box { 
            background: #000; padding: 20px; 
            border: 1px solid #00ff41; 
            border-radius: 4px; font-size: 1.2rem; 
            margin: 25px 0; color: #00ff41;
            text-shadow: 0 0 8px #00ff41;
        }
        button { 
            background: #00ff41; color: #000; 
            border: none; padding: 12px 30px; 
            cursor: pointer; font-weight: bold; 
            text-transform: uppercase; transition: 0.3s; 
            width: 100%; border-radius: 4px;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #00ff41; }
        
        /* Modal */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 50; }
        .modal-content { border: 1px solid #00ff41; padding: 2rem; width: 80%; max-width: 350px; text-align: center; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>SYNCING DATABASE...</p></div>

<div id="modal">
    <div class="modal-content">
        <h3 style="color:#00ff41">SYSTEM NOTICE</h3>
        <p>KEY SẼ THAY ĐỔI THEO TUẦN</p>
        <button onclick="closeModal()">Xác Nhận</button>
    </div>
</div>

<div class="container hidden" id="mainContent">
    <h2>Access Granted</h2>
    <div class="key-box">NKHOI-KEYBOT-2752011</div>
    <button onclick="copyAndRedirect()">Sao chép & Chuyển hướng</button>
</div>

<script>
    window.onload = () => { setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.display = 'none', 500); }, 1500); };
    
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('mainContent').classList.remove('hidden'); }
    
    function copyAndRedirect() {
        const key = "NKHOI-KEYBOT-2752011";
        navigator.clipboard.writeText(key).then(() => {
            // Thay thế lịch sử duyệt web để người dùng không quay lại được
            window.location.replace("https://discord.gg/PnR5cw8ksQ");
        });
    }
</script>

</body>
</html>
