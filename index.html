<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Terminal</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #00ff41; font-family: 'Courier New', Courier, monospace; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Loading Screen */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #1a1a2e; border-top: 5px solid #00ff41; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Main Container */
        .container { background: #16161e; padding: 2rem; border-radius: 10px; border: 1px solid #333; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); display: none; }
        .key-box { background: #000; padding: 15px; border: 1px solid #00ff41; border-radius: 5px; font-size: 1.1rem; margin: 20px 0; letter-spacing: 2px; }
        button { background: transparent; color: #00ff41; border: 1px solid #00ff41; padding: 10px 25px; cursor: pointer; font-family: inherit; transition: 0.3s; }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }
        
        /* Modal Thông báo */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 50; }
        .modal-content { background: #16161e; padding: 2rem; border: 1px solid #00ff41; border-radius: 10px; text-align: center; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; background: #00ff41; color: #000; padding: 15px; border-radius: 5px; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>INITIALIZING SYSTEM...</p></div>

<div id="modal">
    <div class="modal-content">
        <h3>SYSTEM NOTICE</h3>
        <p>KEY SẼ THAY ĐỔI THEO TUẦN</p>
        <button onclick="closeModal()">Xác Nhận</button>
    </div>
</div>

<div class="container" id="mainContent">
    <h2 style="color: #fff;">🔑 ACTIVE KEY</h2>
    <div class="key-box" id="myKey">NKHOI-KEYBOT-2752011</div>
    <button onclick="copyKey()">Sao chép Key</button>
</div>

<div id="toast">Vui lòng vào Discord nhập key!</div>

<script>
    // Xử lý loading
    window.onload = () => { setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.display = 'none', 500); }, 1500); };
    
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; }
    
    function copyKey() {
        const key = document.getElementById("myKey").innerText;
        navigator.clipboard.writeText(key).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }
</script>

</body>
</html>
