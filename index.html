<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Share Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .key-box {
            background: #eee;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.2rem;
            margin-bottom: 20px;
            word-break: break-all;
            border: 1px dashed #ccc;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Key của bạn</h2>
    <div class="key-box" id="myKey">ABC-123-XYZ-789</div>
    <button onclick="copyKey()">Sao chép Key</button>
</div>

<script>
    function copyKey() {
        const key = document.getElementById("myKey").innerText;
        navigator.clipboard.writeText(key).then(() => {
            alert("Đã sao chép: " + key);
        });
    }
</script>

</body>
</html>
